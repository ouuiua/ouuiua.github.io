<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十五级乡中心幼儿园</title>
<link rel="icon" href="校徽.png" type="image/png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #1a1a1a;
    --gray-900: #2c2c2c;
    --gray-700: #555555;
    --gray-500: #888888;
    --gray-400: #aaaaaa;
    --gray-300: #cccccc;
    --gray-200: #e5e5e5;
    --gray-100: #f5f5f5;
    --white: #ffffff;
    --transition: 0.2s ease;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--black);
    background: var(--white);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ========== NAV ========== */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--gray-200);
  }

  .nav-inner {
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--black);
  }

  .nav-logo {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
  }

  .nav-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    font-size: 14px;
    color: var(--gray-700);
    text-decoration: none;
    transition: color var(--transition);
  }

  .nav-links a:hover,
  .nav-links a.active {
    color: var(--black);
  }

  /* ========== MAIN WRAPPER ========== */
  .main {
    padding-top: 56px;
  }

  /* ========== HERO ========== */
  .hero {
    padding: 120px 32px 80px;
    text-align: center;
    max-width: 720px;
    margin: 0 auto;
  }

  .hero-logo {
    width: 216px;
    height: 216px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 32px;
    border: 1px solid var(--gray-200);
  }

  .hero h1 {
    font-size: 36px;
    font-weight: 700;
    color: var(--black);
    letter-spacing: 1px;
    margin-bottom: 16px;
    line-height: 1.3;
  }

  .hero p {
    font-size: 16px;
    color: var(--gray-500);
    font-weight: 300;
    line-height: 1.8;
    max-width: 520px;
    margin: 0 auto;
  }

  .hero-divider {
    width: 40px;
    height: 1px;
    background: var(--gray-300);
    margin: 48px auto 0;
  }

  /* ========== CONTENT ========== */
  .content {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 32px 120px;
  }

  .content-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-400);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .content-title {
    font-size: 24px;
    font-weight: 600;
    color: var(--black);
    margin-bottom: 8px;
  }

  .content-desc {
    font-size: 14px;
    color: var(--gray-500);
    font-weight: 300;
    margin-bottom: 48px;
    line-height: 1.8;
  }

  /* ========== CAROUSEL ========== */
  .carousel-wrapper {
    position: relative;
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    overflow: hidden;
  }

  .carousel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--gray-200);
  }

  .carousel-header-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-400);
    letter-spacing: 1px;
  }

  .carousel-header-count {
    font-size: 13px;
    color: var(--gray-400);
    font-variant-numeric: tabular-nums;
  }

  .carousel-header-count .cur {
    color: var(--black);
    font-weight: 600;
  }

  .carousel-viewport {
    overflow: hidden;
  }

  .carousel-track {
    display: flex;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .carousel-track.paused {
    transition: none;
  }

  /* Full-width slide */
  .slide {
    min-width: 100%;
    display: flex;
    flex-direction: column;
  }

  .slide-img-wrap {
    width: 100%;
    background: var(--gray-100);
    display: flex;
    justify-content: center;
    overflow: hidden;
    cursor: zoom-in;
  }

  .slide-img-wrap img {
    width: auto;
    height: auto;
    max-width: 100%;
    max-height: 720px;
    object-fit: contain;
    display: block;
  }

  .slide-caption {
    padding: 20px 28px 24px;
    border-top: 1px solid var(--gray-200);
  }

  .slide-tag {
    font-size: 11px;
    font-weight: 500;
    color: var(--gray-400);
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .slide-heading {
    font-size: 18px;
    font-weight: 600;
    color: var(--black);
    margin-bottom: 6px;
    line-height: 1.5;
  }

  .slide-text {
    font-size: 13px;
    color: var(--gray-500);
    font-weight: 300;
    line-height: 1.7;
  }

  /* ========== FLOATING SCROLL BUTTONS ========== */
  .float-scroll {
    position: fixed;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 1px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--gray-200);
  }

  .float-scroll-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    background: var(--white);
    border: none;
    cursor: pointer;
    transition: background var(--transition), color var(--transition);
    color: var(--gray-500);
  }

  .float-scroll-btn:hover {
    background: var(--gray-100);
    color: var(--black);
  }

  .float-scroll-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }

  /* ========== IMAGE OVERLAY ========== */
  .img-overlay {
    position: fixed;
    inset: 0;
    z-index: 500;
    background: rgba(0, 0, 0, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .img-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .img-overlay img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    transform: scale(0.9);
    transition: transform 0.3s ease;
  }

  .img-overlay.open img {
    transform: scale(1);
  }

  .img-overlay-close {
    position: absolute;
    top: 20px;
    right: 24px;
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    transition: background var(--transition);
  }

  .img-overlay-close:hover {
    background: rgba(255,255,255,0.2);
  }

  .img-overlay-close svg {
    width: 20px;
    height: 20px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
  }

  /* ========== FOOTER ========== */
  .footer {
    border-top: 1px solid var(--gray-200);
    padding: 32px;
    text-align: center;
  }

  .footer-inner {
    max-width: 1120px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .footer-logo {
    width: 24px;
    height: 24px;
    border-radius: 50%;
  }

  .footer-name {
    font-size: 13px;
    color: var(--gray-500);
  }

  .footer-copy {
    font-size: 12px;
    color: var(--gray-400);
  }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 768px) {
    .hero { padding: 80px 24px 60px; }
    .hero h1 { font-size: 28px; }
    .hero-logo { width: 140px; height: 140px; }
    .content { padding: 0 24px 80px; }
    .slide-img-wrap img { max-height: 400px; }
    .slide-caption { padding: 16px 20px 20px; }
    .slide-heading { font-size: 16px; }
    .footer-inner { flex-direction: column; gap: 12px; }
    .float-scroll { right: 12px; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="#">
      <img class="nav-logo" src="校徽.png" alt="校徽">
      <span class="nav-name">十五级乡中心幼儿园</span>
    </a>
    <ul class="nav-links">
      <li><a href="#" class="active">首页</a></li>
      <li><a href="#news">最新动态</a></li>
    </ul>
  </div>
</nav>

<div class="main">

  <!-- HERO -->
  <section class="hero">
    <img class="hero-logo" src="校徽.png" alt="校徽">
    <h1>十五级乡中心幼儿园</h1>
    <p>在爱与陪伴中，见证孩子们从懵懂走向自信。<br>毕业不是终点，而是新旅程的起点。</p>
    <div class="hero-divider"></div>
  </section>

  <!-- CONTENT -->
  <section class="content" id="news">
    <div class="content-label">News</div>
    <h2 class="content-title">最近动态</h2>
    <p class="content-desc">时光荏苒，孩子们即将踏上人生新的旅程。<br>让我们用镜头定格这些珍贵而温暖的瞬间。</p>

    <div class="carousel-wrapper" id="carouselWrapper">
      <div class="carousel-header">
        <span class="carousel-header-label">毕业季</span>
        <span class="carousel-header-count"><span class="cur" id="curNum">01</span> / 02</span>
      </div>

      <div class="carousel-viewport">
        <div class="carousel-track" id="carouselTrack">

          <div class="slide">
            <div class="slide-img-wrap">
              <img src="毕业1.jpg" alt="毕业照1">
            </div>
            <div class="slide-caption">
              <div class="slide-tag">毕业典礼</div>
              <div class="slide-heading">我们毕业了！</div>
              <div class="slide-text">今天，我们告别了熟悉的教室和滑梯，但每一张笑脸都永远印在了老师的心中。</div>
            </div>
          </div>

          <div class="slide">
            <div class="slide-img-wrap">
              <img src="毕业2.jpg" alt="毕业照2">
            </div>
            <div class="slide-caption">
              <div class="slide-tag">毕业留念</div>
              <div class="slide-heading">不谙世事的笑脸下面藏满了恋恋不舍...</div>
              <div class="slide-text">那些天真烂漫的笑容里，藏着对幼儿园深深的眷恋与不舍。</div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </section>

</div>

<!-- FLOATING SCROLL BUTTONS -->
<div class="float-scroll">
  <button class="float-scroll-btn" type="button" id="floatTop" aria-label="回到顶部">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
  </button>
  <button class="float-scroll-btn" type="button" id="floatBottom" aria-label="回到底部">
    <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
  </button>
</div>

<!-- IMAGE OVERLAY -->
<div class="img-overlay" id="imgOverlay">
  <button class="img-overlay-close" type="button" id="overlayClose">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <img src="" alt="" id="overlayImg">
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <img class="footer-logo" src="校徽.png" alt="校徽">
      <span class="footer-name">十五级乡中心幼儿园</span>
    </div>
    <span class="footer-copy">&copy; 2026</span>
  </div>
</footer>

<script>
  const track = document.getElementById('carouselTrack');
  const curNum = document.getElementById('curNum');
  const wrapper = document.getElementById('carouselWrapper');
  const slides = track.querySelectorAll('.slide');
  const total = slides.length;
  let current = 0;
  let timer;

  function goTo(index) {
    if (index < 0) index = total - 1;
    if (index >= total) index = 0;
    current = index;
    track.style.transform = `translateX(-${current * 100}%)`;
    curNum.textContent = String(current + 1).padStart(2, '0');
  }

  function next() { goTo(current + 1); }
  function prev() { goTo(current - 1); }

  // Auto scroll
  function resetTimer() {
    clearInterval(timer);
    timer = setInterval(next, 4000);
  }

  resetTimer();

  // Hover pause
  wrapper.addEventListener('mouseenter', () => {
    clearInterval(timer);
    track.classList.add('paused');
  });

  wrapper.addEventListener('mouseleave', () => {
    track.classList.remove('paused');
    resetTimer();
  });

  // Scroll to top / bottom
  document.getElementById('floatTop').addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  document.getElementById('floatBottom').addEventListener('click', () => {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') { prev(); resetTimer(); }
    if (e.key === 'ArrowRight') { next(); resetTimer(); }
    if (e.key === 'Escape') closeOverlay();
  });

  // Image expand on click
  const overlay = document.getElementById('imgOverlay');
  const overlayImg = document.getElementById('overlayImg');

  document.querySelectorAll('.slide-img-wrap').forEach(wrap => {
    wrap.addEventListener('click', () => {
      const img = wrap.querySelector('img');
      overlayImg.src = img.src;
      overlayImg.alt = img.alt;
      overlay.classList.add('open');
    });
  });

  function closeOverlay() {
    overlay.classList.remove('open');
    setTimeout(() => { overlayImg.src = ''; }, 300);
  }

  document.getElementById('overlayClose').addEventListener('click', closeOverlay);
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeOverlay();
  });
</script>

</body>
</html>
